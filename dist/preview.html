<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Stirod Icons Preview</title>

<style>
body {
	font-family: sans-serif;
	padding: 2rem;
}

h1 {
	margin-bottom: 2rem;
}

.grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
	gap: 1rem;
}

.card {
	border: 1px solid #ddd;
	border-radius: 8px;
	padding: 1rem;
	text-align: center;
}

svg {
	width: 48px;
	height: 48px;
	fill: none;
	stroke: currentColor;
	stroke-width: 1.5;
	stroke-linecap: round;
	stroke-linejoin: round;
}

.name {
	margin-top: 1rem;
	font-size: 14px;
}
</style>

</head>

<body>

<h1>Stirod Icons</h1>

<div class="grid">


<div class="card">
	<svg>
		<use href="./sprite.svg#astro"></use>
	</svg>

	<div class="name">astro</div>
</div>
